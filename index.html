<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>MGA Fan World</title>

    <style>
      body{
        margin:0;
        font-family:sans-serif;
        background:linear-gradient(135deg,#8fff9c,#8be8ff);
        overflow-x:hidden;
      }

      .bubble{
        position:fixed;
        bottom:-100px;
        width:40px;
        background:rgba(255,255,255,0.4);
        border-radius:50%;
        animation:float 12s infinite;
      }

      @keyframes float{
        0%{transform:translateY(0)}
        100%{transform:translateY(-120vh)}
      }

      .hero{
        height:90vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        text-align:center;
        color:white;
      }
      
    </style>
  </head>
