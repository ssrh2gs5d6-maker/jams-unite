<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>MGA Fan World</title>

    <style>
      body{
        margin:0;
        font-family:sans-serif;
        background:linear-gradient(135deg,#8fff9c,#8be8ff);
        overflow-x:hidden;
      }

      .bubble{
        position:fixed;
        bottom:-100px;
        width:40px;
        background:rgba(255,255,255,0.4);
        border-radius:50%;
        animation:float 12s infinite;
      }

      @keyframes float{
        0%{transform:translateY(0)}
        100%{transform:translateY(-120vh)}
      }

      .hero{
        height:90vh;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        text-align:center;
        color:white;
      }

      .hero h1{
        font-size:60px;
      }

      section{
        padding:80px 10%;
      }

      h2{
        text-align:center;
        font-size:40px;
        margin-bottom:50px;
        color:#0b6e4f;
      }

      .members{
        display:flex;
        justify-content:center;
        gap:40px;
        flex-wrap:wrap;
      }

      .member{
        background:white;
        padding:20px;
        border-radius:20px;
        width:220px;
        text-align:center;
        box-shadow:0 10px 20px rgba(0,0,0,0.1);
      }

      .timeline{
        border-left:4px solid#1b9c85;
        margin:40px auto;
        padding-left:40px;
        max-width:700px;
      }

      .timeline-item{
        margin-bottom:40px;
      }

      .timeline-item h3{
        color:#1b9c85;
      }

      .songs{
        display:grid;
        grid-temolate-columns:repeat(auto-fit,minmax(200px,1fr));
        gap:20px;
      }

      .song{
        background:white;
        padding:20px;
        border-radius:15px;
      }
      
    </style>
  </head>

  <body>

    <!-- バブル -->
    <div class="bubble"style="left:10%animation-durarion:10s"></div>
    <div class="bubble"style="left:30%animation-duration:12s"></div>
    <div class="bubble"style="left:50%:animation-duration:14s"></div>
    <div class="bubble"style="left:70%:animation-duration:11s"></div>
    <div class="bubble"style="left:90%:animation-duration:13s"></div>

    <section class="hero">
      <h1>Mrs.GREENAPPLE</h1>
      <p>ALL about Mrs.GREEN APPLE</p>
    </section>

    <section>

      <h2>メンバー</h2>

      <div class="members">

        <div class="member">
          <h3>大森元貴</h3>
        　<p>Vo/Gt</p>
          <p>P-MGAプロデューサー</p>
        </div>

        <div class="member">
          <h3>若井滉斗</h3>
          <p>Gt</p>
        </div>

        <div class="member">
          <h3>藤澤涼架</h3>
          <p>Key</p>
        </div>
        
    </section>

    <section>

      <h2>Mrs.GREENAPPLE History</h2>

      <div class="timeline">

        <div class="timeline-item">
          <h3>2015 - Phase1</h3>
          <p>メジャーデビュー</p>
        </div>

        <div class="timeline-item">
          <h3>2020 - 活動休止</h3>
          <p>「フェーズ１完結」を宣言。</p>
        </div>

        <div class="timeline-item">
          <h3>2022 - Phase2</h3>
          <p>３人体制再始動。</p>
        </div>

        <div class="timeline-item">
          <h3>2026 - Phase3</h3>
        </div>
        
    </section>

    <section>

      <div class="songs">

        <div class="song">StaRt</div>
        <div class="song">ニュー・マイ・ノーマル</div>
        <div class="song">lulu.</div>
      </div>

    </section>
  </body>
</html>
