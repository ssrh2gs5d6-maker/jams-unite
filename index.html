<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>Mrs.GREENAPPLE Fan Site</title>

    <style>

    body{
      margin:0;
      font-family:sans-serif;
      background:linear-gradient(135deg,#d6ffdf,#b5efc8,#8fdeb2);
      min-height:100vh;
    }

      header{
        text-align:center;
        padding:80px 20px;
        color:white;
      }

      h1{
        font-size:60px;
        text-shadow:3px 3px 0px #2ecc71;
      }

      section{
        max-width:900px;
        margin:auto;
        padding:40px 20px;
      }

      .card{
        background:white;
        padding:30px;
        border-radius:25px;
        margin:20px 0;
        box-shadow:0 10px 20px rgba(0,0,0,0.1);
      }

      .songs{
        display:grid;
        grid-template-columns:repeat(3,1fr)
        gap:20px;
      }

      .song{
        background:white;
        padding:20px;
        border-radius:20px;
        text-align:center;
        font-weight:bold;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
      }

      footer{
        text-align:center;
        padding:30px;
        color:white;
      }

    </style>
  </head>

  <body>

    <header>

      <h1>Mrs.GREENAPLLE</h1>
      <p>Pop&Fresh Music World</p>
    </header>

    <section>

      <div class="card">

        <h2>バンド紹介</h2>

        <p>
          ポップで爽やかなサウンドが魅力の日本のロックバンド
        </p>
      </div>
    
    </section>

    <section>

      <div class="songs">

        <div class="song">愛情と矛先</div>
        <div class="song">WaLL FloWeR</div>
        <div class="song">リスキーゲーム</div>

      </div>

    </section>

    <footer>

      <p>Fan Stie</p>
      
    </footer>
    
  </body>
</html>
